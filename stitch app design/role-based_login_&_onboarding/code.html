<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FabricFlow | Role-Based Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#12aee2",
                        "background-light": "#f6f8f8",
                        "background-dark": "#101d22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>.fabric-texture {
    background-color: #101d22;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuBhdXXJprD4Ja-t6D74tPwJR9psP7kzd5QSj5EvB_GoxgNQ4X8gKSrGQc4jidqry-_Sj1CYVAeR4_DkmFRbpAZroEF5u_Q4oMc7Ucyj08fiA5Sx_64UtGrIHWXxl8ZJi2aCsZyTpjBaPCKoyx-rLq78RV0vRPae5jP1IaiTcIWfDAIYM_iAqCzulWFoudlHxEyBx8sPLy3Z-1bDBHB1IqrwzGt-leRV1scgu8iBp319VhtVzpedlTdgdhSnobbyDYmUEgAPgocnpawS);
    background-attachment: fixed
    }
.glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1)
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white">
<div class="relative flex h-auto min-h-screen w-full flex-col fabric-texture overflow-x-hidden">
<!-- TopAppBar Replacement -->
<div class="flex items-center p-6 pb-2 justify-between">
<div class="text-white flex size-10 shrink-0 items-center justify-center rounded-full bg-white/5" data-icon="close">
<span class="material-symbols-outlined">close</span>
</div>
<div class="flex-1 flex justify-center pr-10">
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">polyline</span>
</div>
<span class="font-bold text-lg tracking-tight">FabricFlow</span>
</div>
</div>
</div>
<div class="px-6 pt-8 pb-4">
<h1 class="text-white tracking-tight text-[32px] font-bold leading-tight">Welcome back</h1>
<p class="text-white/60 text-base font-normal mt-2">Select your portal to continue managing the supply chain.</p>
</div>
<!-- Role Selection (ImageGrid style) -->
<div class="px-6 py-4">
<h3 class="text-sm font-semibold uppercase tracking-widest text-primary mb-4">Choose your role</h3>
<div class="grid grid-cols-2 gap-4">
<!-- Buyer Card -->
<div class="glass-card group relative flex flex-col gap-3 rounded-xl p-5 aspect-square cursor-pointer border-primary/40 bg-primary/5">
<div class="absolute top-3 right-3 text-primary">
<span class="material-symbols-outlined text-xl">check_circle</span>
</div>
<div class="mt-auto">
<div class="size-10 rounded-lg bg-primary/20 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary">shopping_bag</span>
</div>
<p class="text-white text-lg font-bold leading-tight">I am a Buyer</p>
<p class="text-white/40 text-xs mt-1">Design &amp; Ordering</p>
</div>
</div>
<!-- Partner Card -->
<div class="glass-card group flex flex-col gap-3 rounded-xl p-5 aspect-square cursor-pointer transition-all hover:bg-white/5">
<div class="mt-auto">
<div class="size-10 rounded-lg bg-white/10 flex items-center justify-center mb-3 text-white/60">
<span class="material-symbols-outlined">factory</span>
</div>
<p class="text-white text-lg font-bold leading-tight">I am a Partner</p>
<p class="text-white/40 text-xs mt-1">Mills &amp; Logistics</p>
</div>
</div>
</div>
</div>
<!-- Login Form -->
<div class="px-6 py-6 space-y-4">
<div class="space-y-2">
<label class="text-xs font-medium text-white/50 px-1 uppercase tracking-wider">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-white/30">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-medium text-white/50 uppercase tracking-wider">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary/80" href="#">Forgot?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-white/30">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3 pl-10 pr-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-2">
                Sign In
            </button>
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-white/10"></div>
<span class="flex-shrink mx-4 text-white/30 text-xs font-medium uppercase">Or continue with</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<button class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-3 transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-5.38z" fill="currentColor"></path>
</svg>
                Google
            </button>
</div>
<!-- Footer -->
<div class="mt-auto px-6 py-8 text-center">
<p class="text-white/40 text-sm">
                Don't have an account? 
                <a class="text-primary font-bold ml-1" href="#">Get Started</a>
</p>
</div>
<!-- Header Image with background styling (as requested in list) -->
<div class="@container opacity-20 pointer-events-none fixed bottom-0 left-0 w-full -z-10">
<div class="w-full bg-center bg-no-repeat bg-cover min-h-[400px]" data-alt="Abstract soft blue fabric folds texture" style='background-image: linear-gradient(180deg, rgba(16, 29, 34, 1) 0%, rgba(16, 29, 34, 0) 50%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuCRYKvCl820PIz_FiVz_DNE69NT6Z11EYTsZjRLUGgfPSBVPGURHWEqMLjZ_3Pq42z_1MXL9als5e-kkiv2oc-g5CtGv95FWRivK3RCiaGFAGrbOidoQ_k32NY7TUZ1IfefMR-1HovYHkUsysljiRkl6mnzN-hJi0sWaOwU3bcTAnTG63e6RKCBKlSLZRmlQpnvyOjZTVacbJse8yo9EQQ_8YPvSJ42VC1hSQC_tB7Jg3BXgDdG4xFfCTsksIb3Jc1_YFSR3n4dF4-C");'></div>
</div>
</div>
</body></html>
